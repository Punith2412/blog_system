{% extends "base.html" %}
{% block content %}
<h1>Admin Panel</h1>
<a href="/admin/post/new">New Post</a> | <a href="/admin/logout">Logout</a>
<table>
    <tr><th>Title</th><th>Category</th><th>Actions</th></tr>
    {% for post in posts %}
    <tr>
        <td>{{ post.title }}</td>
        <td>{{ post.category_name }}</td>
        <td>
            <a href="/admin/post/{{ post.id }}/edit">Edit</a> | 
            <a href="/admin/post/{{ post.id }}/delete">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
